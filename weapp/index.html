<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Telegram Profile Mini App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <div class="avatar-container">
                <img id="avatar" class="avatar" src="default-avatar.png" alt="Profile picture">
                <div class="status-indicator" id="premiumBadge"></div>
            </div>
            <h1 id="fullName">Loading...</h1>
            <p id="username">@username</p>
        </div>

        <div class="profile-info">
            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">🆔 Telegram ID</span>
                    <span class="info-value" id="userId">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">👤 First Name</span>
                    <span class="info-value" id="firstName">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">👥 Last Name</span>
                    <span class="info-value" id="lastName">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">🔖 Username</span>
                    <span class="info-value" id="usernameField">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">🌐 Language</span>
                    <span class="info-value" id="languageCode">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">⭐ Premium</span>
                    <span class="info-value" id="isPremium">-</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="shareBtn">📤 Share Profile</button>
            <button class="btn btn-secondary" id="closeBtn">❌ Close</button>
        </div>

        <div class="footer">
            <p>Powered by Telegram Mini App</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
